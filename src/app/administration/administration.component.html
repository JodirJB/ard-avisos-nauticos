<app-toolbar [homeRoute]="'/administration'" [reportRoute]="'/administrative-report'" [noticesRoute]="'/administrative-nautical-notices'"></app-toolbar>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 min-h-[calc(100vh-64px)] items-center max-w-7xl mx-auto px-4 py-8 md:py-0">

    <div class="flex flex-col justify-center items-center md:items-start text-center md:text-left w-full relative space-y-8 p-4 md:p-8">
        
        <img src="/svg/waves.svg" class="absolute inset-0 w-full h-full object-cover -z-10 opacity-60 pointer-events-none" alt="waves background" />

        <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-[#003876] leading-tight drop-shadow-sm">
            Avisos Náuticos <br class="hidden md:block"> Administrativo
        </h1>

        <div class="flex flex-wrap gap-4 w-full justify-center md:justify-start">
            <button mat-flat-button 
                    routerLink="/administrative-nautical-notices"
                    class="!bg-[#003876] !text-white !rounded-xl text-lg font-bold shadow-lg shadow-blue-900/20 hover:!bg-blue-900 hover:scale-105 hover:-translate-y-1 transition-all duration-300 w-full md:w-auto min-h-[60px]">
                Ver avisos
            </button>

            <button mat-flat-button 
                    routerLink="/administrative-report"
                    class="!bg-[#EFB400]/10 !text-[#EFB400] !border-2 !border-[#EFB400] !rounded-xl text-lg font-bold shadow-md hover:!bg-[#EFB400] hover:!text-white hover:scale-105 hover:-translate-y-1 transition-all duration-300 w-full md:w-auto min-h-[60px]">
                Reporte Administrativo
            </button>
        </div>

        <div class="text-[#003876] font-medium text-lg md:text-xl leading-relaxed max-w-lg">
            El Servicio Hidrográfico de la <span class="font-bold">Armada de la República Dominicana</span>,
            ha implementado la sección de <span class="font-bold text-[#EFB400]">AVISOS A LOS NAVEGANTES</span>,
            procura de brindar seguridad a la navegación marítima en los
            espacios marítimos nacionales.
        </div>
    </div>

    <div class="w-full flex justify-center items-center p-4  ">
        <div class="w-full max-w-[626px]">
            <app-carousel></app-carousel>
        </div>
    </div>
</div>

<app-footer></app-footer>
