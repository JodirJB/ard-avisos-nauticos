<app-toolbar></app-toolbar>
<div class="min-h-screen bg-[#FAFAFA] py-12 px-4 flex justify-center items-start">
    
    <div class="w-full max-w-4xl bg-white rounded-xl shadow-xl shadow-[#003876]/10 border border-gray-100 overflow-hidden">

        <div class="pt-10 pb-6 text-center">
            <h1 class="text-[#003876] font-extrabold text-3xl md:text-4xl tracking-tight inline-block relative">
               <span class="relative inline-block">            
            Reportar Aviso
            <span class="absolute left-0 -bottom-2 w-13 h-[6px] bg-[#EFB400] rounded-full"></span>
            </span>
            </h1>
            <p class="text-gray-500 mt-4 text-sm mx-auto">
                Complete el formulario para reportar una anomalía. Los campos marcados con <span class="text-red-500">*</span> son obligatorios.
            </p>
        </div>

        <div class="p-8 md:p-12">
            <form (submit)="onSubmit()" class="space-y-10">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    
                    <div class="flex flex-col">
                        <label class="text-[#003876] font-bold text-sm mb-2">Fecha de recepción <span class="text-red-500">*</span></label>
                        <input type="date" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[#003876] font-bold text-sm mb-2">Fecha de remisión <span class="text-red-500">*</span></label>
                        <input type="date" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[#003876] font-bold text-sm mb-2">Fuente <span class="text-red-500">*</span></label>
                        <input type="text" placeholder="Ej: Capitán de Puerto..." class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[#003876] font-bold text-sm mb-2">E-mail o teléfono de contacto <span class="text-red-500">*</span></label>
                        <input type="text" placeholder="contacto@ejemplo.com" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                    </div>
                </div>

                <div class="border-t border-gray-100"></div>

                <div>
                    <h3 class="text-[#003876] font-bold text-lg uppercase tracking-wide mb-6 border-l-4 border-[#EFB400] pl-3">
                        Datos Referentes a la Anomalía
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                        
                        <div class="flex flex-col">
                            <label class="text-[#003876] font-bold text-sm mb-2">Latitud geográfica <span class="text-red-500">*</span></label>
                            <input type="text" placeholder="Ej: 18.4642556" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                        </div>

                        <div class="flex flex-col">
                            <label class="text-[#003876] font-bold text-sm mb-2">Longitud geográfica <span class="text-red-500">*</span></label>
                            <input type="text" placeholder="Ej: -69.123456" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                        </div>

                        <div class="md:col-span-2 flex justify-end">
                            <button type="button" (click)="useMyLocation()" class="flex items-center gap-2 text-sm font-bold text-[#003876] hover:text-[#EFB400] transition-colors cursor-pointer bg-blue-50 px-4 py-2 rounded-lg hover:bg-blue-100">
                                <mat-icon class="text-sm scale-75">my_location</mat-icon>
                                Usar mi ubicación actual
                            </button>
                        </div>

                        <div class="md:col-span-2 flex flex-col">
                            <label class="text-[#003876] font-bold text-sm mb-2">Número y título de la carta náutica que afecta <span class="text-red-500">*</span></label>
                            <input type="text" placeholder="Ej: 123456789 - Puerto Santo Domingo" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all">
                        </div>

                        <div class="md:col-span-2 flex flex-col">
                            <label class="text-[#003876] font-bold text-sm mb-2">Detalles de la anomalía <span class="text-red-500">*</span></label>
                            <textarea rows="4" placeholder="Describa brevemente la situación..." class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-[#003876] focus:border-[#003876] p-3 outline-none transition-all resize-none"></textarea>
                        </div>

                        <div class="md:col-span-2">
                            <label class="text-[#003876] font-bold text-sm mb-2">Documento adjunto</label>
                            <div class="flex items-center justify-center w-full">
                                <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-[#003876]/30 rounded-xl cursor-pointer bg-blue-50/30 hover:bg-blue-50 transition-colors group">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                        <mat-icon class="!w-12 !h-12 !text-5xl text-gray-400 group-hover:text-[#003876] transition-colors mb-2">cloud_upload</mat-icon>
                                        <p class="mb-2 text-sm text-gray-500"><span class="font-bold text-[#003876]">Click para subir</span> o arrastra el archivo aquí</p>
                                        <p class="text-xs text-gray-400">PDF, PNG, JPG (MAX. 5MB)</p>
                                    </div>
                                    <input id="dropzone-file" type="file" class="hidden" />
                                </label>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full bg-[#003876] text-white font-bold rounded-xl py-4 text-lg shadow-lg shadow-blue-900/20 hover:bg-blue-900 hover:scale-[1.01] transition-all duration-300 flex justify-center items-center gap-2">
                        <span>Enviar Reporte</span>
                        <mat-icon>send</mat-icon>
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
<app-footer></app-footer>
